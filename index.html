<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2e7d32">
<title>農検3級 過去問アプリ</title>
<style>
:root{--g:#2e7d32;--g2:#43a047;--bg:#f4f6f3;--card:#fff;--ok:#2e7d32;--ng:#d32f2f;--tx:#222;--mut:#6b7280;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--tx);
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
line-height:1.6;-webkit-text-size-adjust:100%;}
.wrap{max-width:640px;margin:0 auto;padding:0 16px 80px;}
header{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;padding:16px;
position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.15);}
header h1{margin:0;font-size:18px;font-weight:700;}
header .sub{font-size:12px;opacity:.9;margin-top:2px;}
.card{background:var(--card);border-radius:14px;padding:18px;margin:16px 0;
box-shadow:0 1px 4px rgba(0,0,0,.08);}
h2{font-size:16px;margin:0 0 12px;}
label.row{display:flex;align-items:center;gap:10px;padding:10px 4px;font-size:15px;
border-bottom:1px solid #eee;cursor:pointer;}
label.row:last-child{border-bottom:0;}
input[type=checkbox],input[type=radio]{width:20px;height:20px;accent-color:var(--g);}
.btn{display:block;width:100%;padding:15px;border:0;border-radius:12px;font-size:16px;
font-weight:700;background:var(--g);color:#fff;cursor:pointer;margin-top:14px;}
.btn:active{transform:translateY(1px);}
.btn.sec{background:#e8f0e8;color:var(--g);}
.btn.ghost{background:#fff;color:var(--g);border:2px solid var(--g);}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;background:#e8f5e9;color:var(--g);font-weight:600;}
.tag.y{background:#e3f2fd;color:#1565c0;}
.progress{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin:4px 0 14px;}
.progress>i{display:block;height:100%;background:var(--g);width:0;transition:width .3s;}
.qnum{font-size:13px;color:var(--mut);margin-bottom:6px;}
.qtext{font-size:17px;font-weight:600;margin-bottom:16px;}
.choice{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;
padding:14px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;margin-bottom:10px;
font-size:15px;cursor:pointer;color:var(--tx);}
.choice .n{flex:0 0 26px;height:26px;border-radius:50%;background:#eef2ee;color:var(--g);
display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
.choice.ok{border-color:var(--ok);background:#edf7ed;}
.choice.ok .n{background:var(--ok);color:#fff;}
.choice.ng{border-color:var(--ng);background:#fdecea;}
.choice.ng .n{background:var(--ng);color:#fff;}
.choice.dim{opacity:.55;}
.choice:disabled{cursor:default;}
.explain{background:#f1f8e9;border-left:4px solid var(--g);border-radius:8px;
padding:12px 14px;font-size:14px;margin-top:6px;display:none;}
.explain.show{display:block;}
.explain b{color:var(--g);}
.result-big{font-size:44px;font-weight:800;color:var(--g);text-align:center;margin:8px 0;}
.result-sub{text-align:center;color:var(--mut);margin-bottom:8px;}
.bar2{display:flex;gap:10px;}
.bar2 .btn{margin-top:0;}
.mini{font-size:12px;color:var(--mut);text-align:center;margin-top:10px;}
.hide{display:none!important;}
details.tip{border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;background:#fff;overflow:hidden;}
details.tip summary{padding:12px 14px;font-weight:600;font-size:15px;cursor:pointer;list-style:none;color:var(--tx);}
details.tip summary::-webkit-details-marker{display:none;}
details.tip summary::before{content:"＋ ";color:var(--g);font-weight:800;}
details.tip[open] summary::before{content:"－ ";}
details.tip .tipd{padding:0 14px 12px;font-size:14px;color:#333;line-height:1.75;}
.tsec{font-weight:700;color:var(--g);margin:18px 0 8px;font-size:15px;border-bottom:2px solid #e8f5e9;padding-bottom:4px;}
.floatnav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);
padding:10px 16px;border-top:1px solid #e5e7eb;max-width:640px;margin:0 auto;}
.genrewrap{display:flex;gap:8px;flex-wrap:wrap;}
.chip{font-size:13px;padding:8px 12px;border-radius:20px;border:2px solid #cfe0cf;
background:#fff;color:var(--g);cursor:pointer;}
.chip.on{background:var(--g);color:#fff;border-color:var(--g);}
</style>
</head>
<body>
<header>
 <h1>🌱 農検3級 過去問アプリ</h1>
 <div class="sub" id="hsub">全問題オフライン収録・スマホ最適化</div>
</header>
<div class="wrap">

<!-- START -->
<div id="start">
  <button class="btn sec" id="tipsBtn" style="margin-top:16px;">📖 出る所だけ攻略メモを見る</button>
  <div class="card">
    <h2>出題する年度</h2>
    <div id="yearList"></div>
  </div>
  <div class="card">
    <h2>分野でしぼる（任意）</h2>
    <div class="genrewrap" id="genreList"></div>
  </div>
  <div class="card">
    <h2>出題設定</h2>
    <label class="row"><input type="radio" name="order" value="seq" checked> 年度・番号順に出す</label>
    <label class="row"><input type="radio" name="order" value="rand"> ランダムに出す</label>
    <label class="row"><input type="checkbox" id="onlyWrong"> 前回まちがえた問題だけ</label>
    <div style="margin-top:10px;">
      <div style="font-size:14px;color:var(--mut);margin-bottom:6px;">出題数</div>
      <div class="genrewrap" id="countList"></div>
    </div>
  </div>
  <button class="btn" id="startBtn">スタート ▶</button>
  <div class="mini" id="poolInfo"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="hide">
  <div class="card">
    <div class="progress"><i id="pbar"></i></div>
    <div class="qnum" id="qnum"></div>
    <div class="tags" id="qtags"></div>
    <div class="qtext" id="qtext"></div>
    <div id="choices"></div>
    <div class="explain" id="explain"></div>
  </div>
  <div style="height:70px;"></div>
  <div class="floatnav">
    <div class="bar2">
      <button class="btn ghost" id="quitBtn" style="flex:0 0 40%;">終了</button>
      <button class="btn" id="nextBtn" style="flex:1;" disabled>次へ →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="hide">
  <div class="card">
    <h2>結果</h2>
    <div class="result-big" id="score"></div>
    <div class="result-sub" id="scoreSub"></div>
    <div class="progress"><i id="rbar"></i></div>
  </div>
  <div class="card" id="reviewCard">
    <h2>まちがえた問題（<span id="wrongN">0</span>問）</h2>
    <div id="reviewList"></div>
  </div>
  <button class="btn" id="againWrong">まちがえた問題だけ解き直す</button>
  <button class="btn sec" id="home">最初の画面へ</button>
</div>

<!-- TIPS -->
<div id="tips" class="hide">
  <div class="card" id="tipsBody"></div>
  <button class="btn" id="tipsBack">← 問題を解く画面へ</button>
</div>

</div>
<script>
const DATA = [{"year": "2020", "genre": "農業全般", "num": 1, "q": "生活の基礎産業である農業についての説明で、**間違っているもの**はどれか。", "choices": ["農業の基本的な役割は、私たちの命を支える食料生産である。", "農業は、衣料や住居の素材、医薬品の原料生産にもかかわっている。", "農業は、化石燃料などエネルギー資源の生産にもかかわっている。"], "answer": 3, "explain": ""}, {"year": "2020", "genre": "農業全般", "num": 2, "q": "農業就業人口についての説明で、**正しいもの**はどれか。", "choices": ["農業就業人口とは、農業のみに従事しているか、兼業よりも農業の労働日数が多い人の数をいう。", "2019年の農業就業人口は200万人台に回復した。", "2019年の農業就業者は、65歳以上が全体の60％を切り、高齢化に歯止めがかかった。", "2014年度以降、49歳以下の若手新規就農者が毎年4～5万人、就農している。"], "answer": 1, "explain": ""}, {"year": "2020", "genre": "農業全般", "num": 3, "q": "「農産物直売所」についての説明で、**間違っているもの**はどれか。", "choices": ["地産地消の多品目販売の場になっている。", "少量の農産物でも出荷でき、農家が自分で値段を決められる。", "店頭で消費者の反応を直接聞けるので、農家のやりがいにつながっている。", "2017年度の全国の年間総販売額は、6000億円に近づいた。"], "answer": 4, "explain": "年間総販売額は1兆円規模"}, {"year": "2020", "genre": "農業全般", "num": 4, "q": "2013年のカロリーベースの食料自給率が最も高い国として、**正しいもの**はどれか。", "choices": ["カナダ", "オーストラリア", "アメリカ", "フランス"], "answer": 1, "explain": ""}, {"year": "2020", "genre": "農業全般", "num": 5, "q": "耕作放棄地についての説明で、**正しいもの**はどれか。", "choices": ["耕作放棄地とは、過去2年以上作物が栽培されず、今後も農家が耕作に使う意思のない土地のことをいう。", "耕作放棄地は大きく増加していて、2015年には22万haに達している。", "耕作放棄地が発生する原因は「高齢化・労働力不足」が最も多くなっている。"], "answer": 3, "explain": "過去1年以上、2015年は約42万ha"}, {"year": "2020", "genre": "農業全般", "num": 6, "q": "野生鳥獣による被害についての説明で、**間違っているもの**はどれか。", "choices": ["2018年度の農作物への被害額(全国合計)で、最も多いのはサルによる被害である。", "中山間農業地域では、野生鳥獣による被害が多いことも耕作放棄地が増える要因になっている。", "駆除した野生鳥獣を地域資源のジビエとして活用する取り組みが広がっている。"], "answer": 1, "explain": "最も多いのはシカによる被害"}, {"year": "2020", "genre": "環境", "num": 7, "q": "地球温暖化についての説明で、**正しいもの**はどれか。", "choices": ["大気中の温室効果ガスは地表面から放出される赤外線を吸収し、再び地表面に向けて放出するので、地球の気温が上昇する。", "温室効果ガスのうち、大気中に最も多いのは二酸化炭素で温室効果ガス全体の4割を占めている。", "温室効果ガスにより、地表の年間平均気温は約20℃に保たれている。", "観測衛星「いぶき」の観測では、世界の平均二酸化炭素濃度は2019年11月には20年前と比べて10ppmも増加している。"], "answer": 1, "explain": "二酸化炭素は約6割、年間平均気温は約15℃"}, {"year": "2020", "genre": "環境", "num": 8, "q": "地球温暖化による農業への影響についての説明で、**間違っているもの**はどれか。", "choices": ["地球温暖化が進むことで、本来その地域にいなかった生物の生息域が広がることが考えられている。", "将来温暖化が進むと、いもち病の激発地帯が現在の東北から関東に変わると予想されている。", "果樹では高温によって、リンゴ、ブドウ、カキなどの果皮の着色が不良になる事例が報告されている。"], "answer": 2, "explain": "いもち病激発地帯は東北から北海道へ移動"}, {"year": "2020", "genre": "環境", "num": 9, "q": "パリ協定についての説明で、**間違っているもの**はどれか。", "choices": ["できるだけ早く世界の温室効果ガスの排出量の増加を止めることが目標の一つとされた。", "2020年以降の温室効果ガスを削減するための国際的な取り決めである。", "世界の平均気温の上昇を産業革命以前に比べて2℃以内、できれば1.5℃に抑える努力をすることが目標の一つとされた。", "22世紀後半までには温室効果ガスの排出量に対して森林などによる吸収量を2倍にすることが目標の一つとされた。"], "answer": 4, "explain": "21世紀後半に排出量と吸収量のバランスをとる"}, {"year": "2020", "genre": "環境", "num": 10, "q": "生物多様性についての説明で、**正しいもの**はどれか。", "choices": ["生物多様性は5つの階層(レベル)に分けて考えられている。", "生態系の多様性とは、自然環境の中でいろいろな動植物がかかわりあって生きている状態をいう。", "同じ種の生物でも、それぞれが多様な遺伝子を持っていることを、種の多様性という。"], "answer": 2, "explain": "3階層。3は遺伝子の多様性"}, {"year": "2020", "genre": "環境", "num": 11, "q": "農地や農村にある生態系についての説明で、**間違っているもの**はどれか。", "choices": ["農地生態系とは、水田の中で、昆虫が卵から成虫まで一生をつなげている状態をいう。", "アキアカネは秋に水田に産卵し、春は水田で幼虫期を過ごし、夏に成虫となって高地に移動し、秋に水田に戻ってくる。", "タンチョウヅルは越冬のために日本に飛来し、人間がつくりだした水田を餌場として利用している。"], "answer": 1, "explain": "農地生態系は水田内の昆虫だけを指すのではなく、農地・農村周辺で多くの生物が生命をつなぐ状態"}, {"year": "2020", "genre": "環境", "num": 12, "q": "地産地消についての説明で、**間違っているもの**はどれか。", "choices": ["地域で生産された農産物をその地域で消費することを地産地消という。", "生産者と消費者の距離が縮まることで、消費者は新鮮で安価な農産物を得ることができる。", "生産物の輸送距離が短くなるので、フードマイレージを大きくすることができる。", "学校給食などに地元産の食材を使うことによって、食育の推進を図ることができる。"], "answer": 3, "explain": "フードマイレージを小さくできる"}, {"year": "2020", "genre": "食", "num": 13, "q": "肥満の定義についての説明で、**正しいもの**はどれか。", "choices": ["肥満とは、体重が100kg以上ある状態のことをいう。", "肥満とは、腹回りが100cm以上ある状態のことをいう。", "肥満とは、脂肪が体に必要以上に蓄積した状態のことをいう。"], "answer": 3, "explain": ""}, {"year": "2020", "genre": "食", "num": 14, "q": "生活習慣病についての説明で、**正しいもの**はどれか。", "choices": ["生活習慣病は、食習慣や運動習慣、喫煙、飲酒、ストレスなどの生活習慣が深く関与し、発症の原因となる疾患の総称である。", "現在、生活習慣病とされているのは心疾患、動脈硬化症、糖尿病、高血圧症の4つの病気である。", "内臓肥満に、いずれか3つ以上の生活習慣病が重なった状態をメタボリックシンドロームと呼んでいる。"], "answer": 1, "explain": "メタボは内臓肥満＋2つ以上の生活習慣病"}, {"year": "2020", "genre": "食", "num": 15, "q": "基礎代謝量についての説明で、**間違っているもの**はどれか。", "choices": ["基礎代謝量とは、安静な状態で生命維持に使われる必要最小限のエネルギー代謝量のことである。", "年齢が上がるとともに基礎代謝量は大きくなっていく。", "運動不足は筋肉量の減少につながり、これにより基礎代謝量が低下し、エネルギー消費量も少なくなる。"], "answer": 2, "explain": "加齢とともに基礎代謝量は低下する"}, {"year": "2020", "genre": "食", "num": 16, "q": "栄養素についての説明で、**間違っているもの**はどれか。", "choices": ["人は食事から栄養素を摂ることによって、エネルギーを得、体をつくり、体の調子を整えている。", "「炭水化物」「脂質」「タンパク質」を合わせて三大栄養素と呼んでいる。", "ビタミンは三大栄養素の代謝を助け、体の調子を整える働きをしている。", "食物繊維は無機質の一種で、腸の調子を整える働きをしている。"], "answer": 4, "explain": "食物繊維は炭水化物の一種"}, {"year": "2020", "genre": "食", "num": 17, "q": "和食についての説明で、**間違っているもの**はどれか。", "choices": ["ユネスコ無形文化遺産に「和食：日本人の伝統的な食文化」が登録されている。", "和食の基本は、ごはん、香の物や汁物に、主菜と副菜、副副菜数種を組み合わせた「一汁五菜」である。", "和食は、「昆布」「かつお節」「干ししいたけ」「にぼし」などのだしを効かせて、素材の味を生かして調理される。"], "answer": 2, "explain": "和食の基本は「一汁三菜」"}, {"year": "2020", "genre": "食", "num": 18, "q": "生鮮食品の表示についての説明で、**間違っているもの**はどれか。", "choices": ["輸入された肉は、「原産国名」が表示される。", "輸入された魚は、「原産国名」が表示される。", "冷凍品を解凍した魚には「冷凍」と表示される。", "野菜・果物には、名称と原産地が表示される。"], "answer": 3, "explain": "「解凍」と表示される"}, {"year": "2020", "genre": "食", "num": 19, "q": "消費期限・賞味期限についての説明で、**正しいもの**はどれか。", "choices": ["消費期限は、おいしく食べられる期限のことである。", "賞味期限は、安全に食べられる期限のことである。", "賞味期限を過ぎても、すぐに食べられなくなるということではない。"], "answer": 3, "explain": "消費期限＝安全に食べられる期限、賞味期限＝おいしく食べられる期限"}, {"year": "2020", "genre": "食", "num": 20, "q": "下図(JASマーク)についての説明で、**正しいもの**はどれか。", "choices": ["厚生労働省の食品の安全規格に適合していると判定された飲食料品につけるマークである。", "農林水産省の日本農林規格に適合していると判定された飲食料品や林産物につけるマークである。", "消費者庁の消費安全基準に適合していると判定され飲食料品につけるマークである。"], "answer": 2, "explain": ""}, {"year": "2020", "genre": "食", "num": 21, "q": "食事の仕方についての説明で、**間違っているもの**はどれか。", "choices": ["世界の食事の仕方は「手食」「ナイフ・スプーン・フォーク食」「箸食」の3つに分類されると言われている。", "食前の「いただきます」は食材となった命への感謝など、食作法は感謝の気持ちを表すことから生まれてきている。", "食事の時に、料理を大皿から一人一人に取り分ける箸は「渡し箸」という。"], "answer": 3, "explain": "取り分ける箸は「取り箸」。渡し箸はマナー違反"}, {"year": "2020", "genre": "食", "num": 22, "q": "細菌性食中毒の予防の原則で、**正しいもの**はどれか。", "choices": ["細菌を見逃さない、殺菌する、増やさない。", "細菌を見逃さない、つけない、殺菌する。", "細菌をつけない、増やさない、殺菌する。", "細菌をつけない、見逃さない、増やさない。"], "answer": 3, "explain" (1)", "num": 32, "q": "作物の生育に適した土壌酸度(pH)についての説明で、**正しいもの**はどれか。", "choices": ["多くの作物の生育に適した土壌のpHは、5.5～6.5の弱酸性といわれている。", "ホウレンソウはpHの低い土壌を好む。", "サツマイモはpHの高い土壌でよく育つ。", "pHが高い土壌は石灰をまくことで、pHを低くすることができる。"], "answer": 1, "explain": "ホウレンソウは中性寄り、サツマイモは酸性寄り、石灰でpHは上がる"}, {"year": "2020", "genre": "栽培(2)", "num": 33, "q": "害虫の防除方法についての説明で、**間違っているもの**はどれか。", "choices": ["天敵を活用して害虫の生育密度を減らす方法を、生物的防除法という。", "害虫の飛来や産卵を防ぐために「防虫ネット」を活用する方法を、物理的防除法という。", "株元をシルバーマルチで覆い、アザミウマなどが近づかないようにする方法を耕種的防除法という。"], "answer": 3, "explain": "シルバーマルチは物理的防除"}, {"year": "2020", "genre": "栽培(2)", "num": 34, "q": "プランター栽培に適した用土についての説明で、**間違っているもの**はどれか。", "choices": ["水はけがよく、根腐れを心配せずに毎日たっぷり水やりができる土が適している。", "プランターは乾きやすく、かん水により肥料分も抜けやすいので、保水力・保肥力がある土が適している。", "微生物を増やして良い土質にするために、有機質を多く含んだ土が適している。", "プランターは、土の量が少なく肥料焼けを起こすので、肥料分が入っていない土が適している。"], "answer": 4, "explain": "元肥入りの土を使う"}, {"year": "2020", "genre": "栽培(2)", "num": 35, "q": "イネの分げつについての説明で、**正しいもの**はどれか。", "choices": ["苗が成長するときに、新しく出てくる根のことである。", "苗が成長するときに、新しく出てくる茎のことである。", "苗が成長するときに、新しく出てくる葉のことである。"], "answer": 2, "explain": ""}, {"year": "2020", "genre": "栽培(2)", "num": 36, "q": "イネの芽出しに必要な積算水温についての説明で、**正しいもの**はどれか。", "choices": ["50℃を超えると芽を出し始める。", "100℃を超えると芽を出し始める。", "150℃を超えると芽を出し始める。", "200℃を超えると芽を出し始める。"], "answer": 2, "explain": ""}, {"year": "2020", "genre": "栽培(2)", "num": 37, "q": "イネの種まきに適した種もみの状態についての説明で、**正しいもの**はどれか。", "choices": ["種もみが吸水を始め、もみがわずかにふくらみ始めた状態。", "種もみが吸水して丸くふくらんでいるが、芽はまだ外に出ていない状態。", "種もみが吸水して丸くふくらみ、白い芽が1mmほど出てきた状態(ハト胸状態)。", "種もみが吸水して丸くふくらみ、白い芽が5mm以上伸びだした状態。"], "answer": 3, "explain": ""}, {"year": "2020", "genre": "栽培(2)", "num": 38, "q": "日本で栽培されているカブについての説明で、**間違っているもの**はどれか。", "choices": ["日本で栽培されているカブは、アジア系品種とヨーロッパ系品種に大別されている。", "現在、市場流通の中心は、東京都金町付近で古くから作られていた「万木(ゆるぎ)かぶ」を改良したものである。", "食用部(肥大部)の表面が紅色をした赤カブにはアントシアニンが含まれている。"], "answer": 2, "explain": "市場流通の中心は「金町小かぶ」。万木かぶは滋賀県の在来種"}, {"year": "2020", "genre": "栽培(2)", "num": 39, "q": "カブについての説明で、**間違っているもの**はどれか。", "choices": ["日照を好み、日当たりが良いと葉もカブの食用部も充実する。", const YEARS = [...new Set(DATA.map(q=>q.year))].sort().reverse();
const GENRES = [...new Set(DATA.map(q=>q.genre))];
const LS = "nouken3_state";

function saveWrong(list){ try{localStorage.setItem("nouken3_wrong", JSON.stringify(list));}catch(e){} }
function loadWrong(){ try{return JSON.parse(localStorage.getItem("nouken3_wrong")||"[]");}catch(e){return [];} }
function qid(q){ return q.year+"-"+q.num; }

// build start UI
const yearList=document.getElementById("yearList");
YEARS.forEach(y=>{
  const l=document.createElement("label"); l.className="row";
  l.innerHTML=`<input type="checkbox" class="yc" value="${y}" checked> ${y}年度（${DATA.filter(q=>q.year===y).length}問）`;
  yearList.appendChild(l);
});
const genreList=document.getElementById("genreList");
let genreSel=new Set();
GENRES.forEach(g=>{
  const b=document.createElement("div"); b.className="chip"; b.textContent=g;
  b.onclick=()=>{ if(genreSel.has(g)){genreSel.delete(g);b.classList.remove("on");}else{genreSel.add(g);b.classList.add("on");} updatePool();};
  genreList.appendChild(b);
});
const countList=document.getElementById("countList");
let countSel=50;
[10,20,30,50,"全部"].forEach((c,idx)=>{
  const b=document.createElement("div"); b.className="chip"+(c===50?" on":""); b.textContent=(c==="全部"?"全部":c+"問");
  b.dataset.v=c;
  b.onclick=()=>{ countList.querySelectorAll(".chip").forEach(x=>x.classList.remove("on")); b.classList.add("on"); countSel=c; updatePool(); };
  countList.appendChild(b);
});

function selectedYears(){ return [...document.querySelectorAll(".yc:checked")].map(x=>x.value); }
function currentPool(){
  const ys=selectedYears();
  let pool=DATA.filter(q=>ys.includes(q.year));
  if(genreSel.size) pool=pool.filter(q=>genreSel.has(q.genre));
  if(document.getElementById("onlyWrong").checked){
    const w=new Set(loadWrong()); pool=pool.filter(q=>w.has(qid(q)));
  }
  return pool;
}
function updatePool(){
  const n=currentPool().length;
  document.getElementById("poolInfo").textContent="対象 "+n+"問"+(countSel==="全部"?"":(" / 出題 "+Math.min(countSel,n)+"問"));
}
document.querySelectorAll(".yc").forEach(c=>c.onchange=updatePool);
document.getElementById("onlyWrong").onchange=updatePool;
updatePool();

let quiz=[], idx=0, correct=0, wrong=[];
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

document.getElementById("startBtn").onclick=()=>{
  let pool=currentPool();
  if(pool.length===0){ alert("対象の問題がありません。年度や条件を見直してください。"); return; }
  const order=document.querySelector("input[name=order]:checked").value;
  pool=pool.slice();
  if(order==="rand") shuffle(pool); else pool.sort((a,b)=> a.year!==b.year? b.year.localeCompare(a.year): a.num-b.num);
  if(countSel!=="全部") pool=pool.slice(0,countSel);
  quiz=pool; idx=0; correct=0; wrong=[];
  show("quiz"); render();
};

function show(id){ ["start","quiz","result","tips"].forEach(s=>document.getElementById(s).classList.toggle("hide",s!==id)); window.scrollTo(0,0); }

function render(){
  const q=quiz[idx];
  document.getElementById("pbar").style.width=((idx)/quiz.length*100)+"%";
  document.getElementById("qnum").textContent=`問 ${idx+1} / ${quiz.length}`;
  document.getElementById("qtags").innerHTML=`<span class="tag y">${q.year}年度</span><span class="tag">${q.genre}</span><span class="tag">原本 問${q.num}</span>`;
  document.getElementById("qtext").textContent=q.q;
  const cc=document.getElementById("choices"); cc.innerHTML="";
  q.choices.forEach((c,i)=>{
    const b=document.createElement("button"); b.className="choice";
    b.innerHTML=`<span class="n">${i+1}</span><span>${escapeHtml(c)}</span>`;
    b.onclick=()=>pick(i+1,b);
    cc.appendChild(b);
  });
  const ex=document.getElementById("explain"); ex.className="explain"; ex.innerHTML="";
  document.getElementById("nextBtn").disabled=true;
  document.getElementById("nextBtn").textContent = (idx===quiz.length-1)? "結果を見る":"次へ →";
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

let answered=false;
function pick(choice,btn){
  if(answered) return; answered=true;
  const q=quiz[idx];
  const btns=[...document.querySelectorAll("#choices .choice")];
  btns.forEach((b,i)=>{
    b.disabled=true;
    const n=i+1;
    if(q.answer!==0 && n===q.answer) b.classList.add("ok");
    if(n===choice && n!==q.answer) b.classList.add("ng");
    if(n!==choice && n!==q.answer) b.classList.add("dim");
  });
  const ok = q.answer!==0 && choice===q.answer;
  if(ok) correct++; else wrong.push(q);
  const ex=document.getElementById("explain");
  let head = q.answer===0? "この問題は公式に採点除外です":(ok? "◯ 正解！":"✕ 不正解");
  let ans = q.answer===0? "" : `<div>正解は <b>${q.answer}. ${escapeHtml(q.choices[q.answer-1]||"")}</b></div>`;
  let exp = q.explain? `<div style="margin-top:6px;color:#444;">${escapeHtml(q.explain)}</div>`:"";
  ex.innerHTML=`<b>${head}</b>${ans}${exp}`;
  ex.classList.add("show");
  document.getElementById("nextBtn").disabled=false;
}
document.getElementById("nextBtn").onclick=()=>{
  answered=false;
  if(idx<quiz.length-1){ idx++; render(); }
  else finish();
};
document.getElementById("quitBtn").onclick=()=>{ if(confirm("この回を終了して結果を見ますか？")) finish(); };

function finish(){
  const done=idx+ (answered?1:0);
  const total=quiz.length;
  const pct=Math.round(correct/ (done||1) *100);
  document.getElementById("score").textContent=correct+" / "+(done||total);
  document.getElementById("scoreSub").textContent="正答率 "+pct+"%"+(pct>=70?"（合格ライン！）":"");
  document.getElementById("rbar").style.width=pct+"%";
  // save wrong ids (merge)
  const wset=new Set(loadWrong());
  // remove correctly answered from wrong-store, add newly wrong
  const answeredQs=quiz.slice(0,done);
  answeredQs.forEach(q=>{ if(wrong.includes(q)) wset.add(qid(q)); else wset.delete(qid(q)); });
  saveWrong([...wset]);
  document.getElementById("wrongN").textContent=wrong.length;
  const rl=document.getElementById("reviewList"); rl.innerHTML="";
  document.getElementById("reviewCard").classList.toggle("hide",wrong.length===0);
  wrong.forEach(q=>{
    const d=document.createElement("div"); d.style.cssText="padding:10px 0;border-bottom:1px solid #eee;font-size:14px;";
    d.innerHTML=`<div style="color:#888;font-size:12px;">${q.year}年度 問${q.num}・${q.genre}</div>
      <div style="font-weight:600;margin:2px 0;">${escapeHtml(q.q)}</div>
      <div style="color:var(--g);">正解 ${q.answer}. ${escapeHtml(q.choices[q.answer-1]||"—")}</div>
      ${q.explain?`<div style="color:#555;">${escapeHtml(q.explain)}</div>`:""}`;
    rl.appendChild(d);
  });
  show("result");
}
document.getElementById("home").onclick=()=>{ show("start"); updatePool(); };
document.getElementById("againWrong").onclick=()=>{
  if(wrong.length===0){ alert("まちがえた問題はありません！"); return; }
  quiz=shuffle(wrong.slice()); idx=0; correct=0; wrong=[]; answered=false; show("quiz"); render();
};
document.getElementById("hsub").textContent = DATA.length+"問収録・オフライン動作";
